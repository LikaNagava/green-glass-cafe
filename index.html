<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Glass Cafe | Bootstrap Version</title>
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/large.css" media="screen and (min-width: 1601px)" />
    <link rel="stylesheet" href="css/mobile-portrait.css"
        media="screen and (max-width: 767px) and (orientation: portrait)">
    <link rel="stylesheet" href="css/mobile-landscape.css"
        media="screen and (max-width: 1023px) and (orientation: landscape)">
    <link rel="shortcut icon" href="media/favicon.ico" />
</head>

<body>

    <nav class="side-nav-modern">
        <div class="nav-line"></div>
        <a href="#about" class="nav-link active"><span>О НАС</span></a>
        <a href="#categories" class="nav-link"><span>МЕНЮ</span></a>
        <a href="#calculator" class="nav-link"><span>ЗАКАЗ</span></a>
    </nav>
    <div class="main-wrapper">
        <div class="container py-5">
            <header id="about" class="hero-section text-center">
                <h1 class="premium-title">Green <span>Glass</span> Cafe</h1>
                <p class="premium-subtitle">Органическая кухня в объятиях матового стекла</p>
            </header>
            <section id="categories" class="menu-grid-section">
                <div class="row g-4">
                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="category-card-premium" onclick="openMenu('breakfast')">
                            <img src="media/Завтрак.png" class="card-img" alt="Завтрак">
                            <div class="card-overlay"></div>
                            <div class="card-content">
                                <span class="card-number">01</span>
                                <h3 class="card-title">ЗАВТРАКИ</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="category-card-premium" onclick="openMenu('lunch')">
                            <img src="media/Обед.png" class="card-img" alt="Обед">
                            <div class="card-overlay"></div>
                            <div class="card-content">
                                <span class="card-number">02</span>
                                <h3 class="card-title">ОБЕДЫ</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="category-card-premium" onclick="openMenu('salads')">
                            <img src="media/Салаты.png" class="card-img" alt="Салаты">
                            <div class="card-overlay"></div>
                            <div class="card-content">
                                <span class="card-number">03</span>
                                <h3 class="card-title">САЛАТЫ</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="category-card-premium" onclick="openMenu('diet')">
                            <img src="media/Диетическое.png" class="card-img" alt="Диетическое">
                            <div class="card-overlay"></div>
                            <div class="card-content">
                                <span class="card-number">04</span>
                                <h3 class="card-title">ДИЕТИЧЕСКОЕ</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="category-card-premium" onclick="openMenu('drinks')">
                            <img src="media/Напитки.png" class="card-img" alt="Напитки">
                            <div class="card-overlay"></div>
                            <div class="card-content">
                                <span class="card-number">05</span>
                                <h3 class="card-title">НАПИТКИ</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="category-card-premium" onclick="openMenu('desserts')">
                            <img src="media/Десерт.png" class="card-img" alt="Десерт">
                            <div class="card-overlay"></div>
                            <div class="card-content">
                                <span class="card-number">06</span>
                                <h3 class="card-title">ДЕСЕРТЫ</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="calculator" class="receipt-section">
                <div class="receipt-paper">
                    <h2 class="receipt-title">Ваш выбор</h2>
                    <div id="cart-root">
                    </div>
                    <div class="receipt-footer">
                        <div class="dashed-line"></div>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="total-label">ИТОГО К ОПЛАТЕ</span>
                            <span id="total-price" class="total-amount">0 ₽</span>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>
    <div class="modal fade" id="menuModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content custom-modal-style">
                <div class="d-flex h-100">
                    <div class="modal-sidebar d-none d-sm-flex">
                        <div class="sidebar-label" id="modalCategoryName">МЕНЮ</div>
                    </div>
                    <div class="modal-body p-0 position-relative">
                        <button type="button" class="btn-close p-3 position-absolute end-0 top-0"
                            data-bs-dismiss="modal" aria-label="Close"></button>

                        <div class="pages-container" id="pagesWrapper">
                        </div>

                        <div class="modal-nav-buttons p-4">
                            <button class="btn btn-outline-dark btn-sm me-2" onclick="prevPage()">← Назад</button>
                            <button class="btn btn-outline-dark btn-sm" onclick="nextPage()">Вперед →</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
